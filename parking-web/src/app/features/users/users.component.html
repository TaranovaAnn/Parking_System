<div class="page-header">
  <div>
    <h1>Пользователи</h1>
    <p>Учётные записи и роли доступа к системе</p>
  </div>

  <button mat-flat-button color="primary" type="button" (click)="openCreateDialog()">
    <mat-icon>person_add</mat-icon>
    Добавить пользователя
  </button>
</div>

<mat-card class="table-card">
  <table mat-table [dataSource]="users()" class="users-table">
    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef>ФИО</th>
      <td mat-cell *matCellDef="let row">
        <div class="user-cell">
          <mat-icon>person</mat-icon>
          <strong>{{ row.fullName }}</strong>
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="username">
      <th mat-header-cell *matHeaderCellDef>Логин</th>
      <td mat-cell *matCellDef="let row"><code>{{ row.username }}</code></td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let row">{{ row.email }}</td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Роль</th>
      <td mat-cell *matCellDef="let row">
        <mat-chip [class]="roleClass(row.role)">
          <mat-icon>{{ roleIcon(row.role) }}</mat-icon>
          {{ roleLabel(row.role) }}
        </mat-chip>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell empty" [attr.colspan]="displayedColumns.length">
        Пользователи не найдены
      </td>
    </tr>
  </table>
</mat-card>
